[global]
timezone = America/Los_Angeles

# ──────────────────────────────────────────
# Daily scheduled research jobs
# ──────────────────────────────────────────

# Engineering research queue — weekdays 9:00 AM PT
[job-exec "wiki-engineering"]
schedule = 0 9 * * 1-5
command = /bin/bash /app/scripts/run-wiki-research.sh engineering
[notify]
# Log to stdout (visible in Coolify logs)

# Research queue — weekdays 9:30 AM PT
[job-exec "wiki-research"]
schedule = 30 9 * * 1-5
command = /bin/bash /app/scripts/run-wiki-research.sh research

# Personal queue — Sundays 10:00 AM PT
[job-exec "wiki-personal"]
schedule = 0 10 * * 0
command = /bin/bash /app/scripts/run-wiki-research.sh personal

# Competitor scan — Mondays 9:00 AM PT
[job-exec "competitor-scan"]
schedule = 0 9 * * 1
command = /bin/bash /app/scripts/run-competitor-scan.sh

# Deep research — Wednesdays 2:00 PM PT (uses ai-eng-system research-runner: 9 templates, parallel, synthesized)
[job-exec "research-deep"]
schedule = 0 14 * * 3
command = /bin/bash /app/scripts/run-research-runner.sh
