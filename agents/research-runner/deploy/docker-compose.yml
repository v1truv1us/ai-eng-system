services:
  pi-runner:
    build:
      context: .        # repo root (ai-eng-system)
      dockerfile: agents/research-runner/deploy/Dockerfile
    container_name: pi-runner
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      # Optional: short auth JSON if your Coolify env editor allows it.
      - PI_AUTH_JSON=${PI_AUTH_JSON:-}
      # Host path to auth.json (create on VPS — see deploy/README.md).
      - PI_AUTH_HOST_FILE=${PI_AUTH_HOST_FILE:-/data/pi-runner/auth.json}
    volumes:
      # Persistent data: vault, logs, output survive redeployments
      - pi-runner-data:/app/data
      # Pi credentials from VPS host (login with pi on the server, copy auth.json here)
      - ${PI_AUTH_HOST_FILE}:/root/.pi/agent/auth.json:ro
      # Scheduled config (competitors, topics, models) is copied into the image at build time.
      # Redeploy after editing files under deploy/scheduled/ in the repo.
    healthcheck:
      test: ["CMD", "pgrep", "crond"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    labels:
      - "coolify.managed=true"

volumes:
  pi-runner-data:
    driver: local
