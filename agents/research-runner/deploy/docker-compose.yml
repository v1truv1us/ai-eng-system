services:
  pi-runner:
    build:
      context: .        # repo root (ai-eng-system)
      dockerfile: agents/research-runner/deploy/Dockerfile
    container_name: pi-runner
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      # ── Auth: set this in Coolify's env var editor ──
      # Get the value: cd deploy && ./get-auth.sh
      # Mark as LOCKED in Coolify to hide from logs.
      - PI_AUTH_JSON=${PI_AUTH_JSON:-}
    volumes:
      # Persistent data: vault, logs, output, auth survive redeployments
      - pi-runner-data:/app/data
      # Scheduled config (competitors, topics, models) is copied into the image at build time.
      # Redeploy after editing files under deploy/scheduled/ in the repo.
    healthcheck:
      test: ["CMD", "pgrep", "ofelia"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    labels:
      - "coolify.managed=true"

volumes:
  pi-runner-data:
    driver: local
