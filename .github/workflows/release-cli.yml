name: Release CLI Package

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.5.6)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        type: boolean
        default: false

jobs:
  release-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --ignore-scripts --frozen-lockfile
      - if: github.event_name == 'push'
        run: echo "VERSION=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_ENV
      - if: github.event_name == 'workflow_dispatch'
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
      - working-directory: ./packages/cli
        run: bun run build && bun test
      - run: bun scripts/update-publish-versions.ts $VERSION
      - run: bun scripts/prepublish-cli.ts
      - if: github.event.inputs.dry_run == 'true'
        working-directory: ./packages/cli
        run: npm publish --dry-run --access public --provenance
      - if: github.event.inputs.dry_run != 'true'
        working-directory: ./packages/cli
        run: npm publish --access public --provenance
      - if: always()
        run: bun scripts/postpublish-cli.ts
