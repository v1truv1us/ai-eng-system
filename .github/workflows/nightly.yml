name: Nightly Tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Performance tests
        run: bun test tests/performance.test.ts

      - name: Learning automation tests
        run: bun test tests/learning-automation.test.ts

      - name: Integration tests
        run: bun test tests/integration.test.ts tests/integration/ --timeout 120000
